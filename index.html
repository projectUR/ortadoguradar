<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orta Doğu Radar | Anlık Haber Akışı</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Leaflet.js CSS (Map) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header / Navigation -->
    <header class="app-header">
        <div class="header-container">
            <div class="logo">
                <i class="fa-solid fa-radar fa-spin-pulse radar-icon"></i>
                <h1>Orta Doğu <span>Radar</span></h1>
            </div>
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Gündemde ara... (örn: Gazze, Petrol)">
            </div>
            <div class="view-toggles">
                <button class="toggle-btn active" id="btn-feed" title="Haber Akışı">
                    <i class="fa-solid fa-stream"></i> Akış
                </button>
                <button class="toggle-btn" id="btn-map" title="Rasathane (Harita)">
                    <i class="fa-solid fa-earth-asia"></i> Rasathane
                </button>
            </div>
        </div>
    </header>

    <!-- Main Layout -->
    <main class="app-main">

        <!-- Center: News Feed -->
        <section class="feed-container" id="feedContainer">
            <div class="feed-header">
                <h2>Canlı Akış</h2>
                <span class="live-indicator"><span class="dot"></span> Güncelleniyor</span>
            </div>

            <div class="news-feed" id="newsFeed">
                <!-- News Cards injected via JS -->
                <div class="loading-state">
                    <i class="fa-solid fa-circle-notch fa-spin"></i> Veriler Yükleniyor...
                </div>
            </div>
        </section>

        <!-- Right Sidebar: Categories & Trends -->
        <aside class="sidebar-right">
            <div class="sidebar-widget">
                <h3><i class="fa-solid fa-layer-group"></i> Kategoriler</h3>
                <ul class="category-list" id="categoryList">
                    <li class="active" data-cat="Tümü">Tümü</li>
                    <li data-cat="Diplomatik">Diplomatik <span class="badge"></span></li>
                    <li data-cat="Ekonomik">Ekonomik <span class="badge"></span></li>
                    <li data-cat="Çatışma ve Güvenlik">Çatışma ve Güvenlik <span class="badge"></span></li>
                    <li data-cat="Toplum ve İnsan Hakları">Toplum ve İnsan Hakları <span class="badge"></span></li>
                    <li data-cat="Enerji ve Altyapı">Enerji ve Altyapı <span class="badge"></span></li>
                    <li data-cat="Çevre ve İklim">Çevre ve İklim <span class="badge"></span></li>
                </ul>
            </div>

            <div class="sidebar-widget trends-widget">
                <h3><i class="fa-solid fa-fire text-orange"></i> Gündem (Trendler)</h3>
                <ul class="trend-list" id="trendList">
                    <!-- Trends injected via JS -->
                </ul>
            </div>
        </aside>

        <!-- Right / Full Overlay: Map View (Rasathane) -->
        <section class="map-container hidden" id="mapContainer">
            <div class="map-overlay-header">
                <h2>🌍 Rasathane (Isı Haritası)</h2>
                <div class="legend">
                    <span class="legend-item"><span class="dot red"></span> Son 6 Saat</span>
                    <span class="legend-item"><span class="dot green"></span> Son 12 Saat</span>
                    <span class="legend-item"><span class="dot blue"></span> Son 24 Saat</span>
                </div>
            </div>
            <div id="leafletMap"></div>
        </section>

    </main>

    <!-- Leaflet.js JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- Custom Scripts -->
    <script src="js/map.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
