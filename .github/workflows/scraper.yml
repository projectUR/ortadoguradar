name: Orta Dogu Radar Haber Scraper Botu

on:
  schedule:
    # Saatte 1 (veya 2 saatte bir) çalıştırır
    - cron: '*/30 * * * *'
  workflow_dispatch: # GitHub üzerinden manuel tetikleme butonu

jobs:
  scrape_news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 1. Repoyu Kopyala
      uses: actions/checkout@v3

    - name: 2. Node.js Kurulumu
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: 3. Gerekli Kütüphaneleri Yükle
      working-directory: ./bot
      run: npm install

    - name: 4. Botu Çalıştır (RSS Çekme ve AI)
      working-directory: ./bot
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }} # İŞTE EKSİK OLAN ANAHTAR BURASI!
      run: npm start

    - name: 5. Yeni Haberleri Repoya Kaydet (JSON Güncelle)
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/mock_news.json
        git commit -m "🤖 Otomatik Güncelleme: Yeni haberler eklendi" || echo "Güncellenecek yeni haber yok"
        git push
